<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Switcher</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="light">
  <button id="theme-switcher-button" aria-haspopup="true" aria-expanded ="false" aria-controls="theme-dropdown" >Switch Theme</button>
  <ul id="theme-dropdown" role="menu" aria-labelledby="theme-switcher-button" hidden>
    <li role="menuitem" id="theme-light" class="theme-type">Light</li>
    <li role="menuitem" id="theme-dark" class="theme-type">Dark</li>
    <li role="menuitem" id="theme-ocean" class="theme-type">Ocean</li>
    <li role="menuitem" id="theme-nord" class="theme-type">Nord</li>
  </ul>
  <div aria-live="polite">
  </div>

  <script src="./script.js"></script>
</body>
</html>
